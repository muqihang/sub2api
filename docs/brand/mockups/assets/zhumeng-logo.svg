<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zhumeng Workstation logo</title>
  <desc id="desc">A premium Z-shaped route mark with a guiding star, representing unified AI tools and model orchestration.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17213F"/>
      <stop offset="0.48" stop-color="#080D1D"/>
      <stop offset="1" stop-color="#060710"/>
    </linearGradient>
    <linearGradient id="gold" x1="133" y1="125" x2="382" y2="395" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0BE"/>
      <stop offset="0.46" stop-color="#D9B779"/>
      <stop offset="1" stop-color="#9E7B3F"/>
    </linearGradient>
    <linearGradient id="blue" x1="103" y1="116" x2="417" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#86C7FF"/>
