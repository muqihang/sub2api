mode: sub2api
server:
  port: 18443
  tls:
    cert: ""
    key: ""
upstream:
  url: "https://api.anthropic.com"
providers:
  anthropic: true
auth:
  gateway_token: "${CC_GATEWAY_TOKEN}"
  tokens:
identity:
  device_id: "<from-account-identity>"
  email: redacted-email
env:
  platform: darwin
  platform_raw: darwin
  arch: arm64
  node_version: v22.22.2
  terminal: iTerm2.app
  package_managers: npm
  runtimes: node
  is_running_with_bun: false
  is_ci: false
  is_claude_ai_auth: true
  version: 2.1.150
  version_base: 2.1.150
  deployment_environment: production-session
prompt_env:
  platform: darwin
  shell: zsh
  working_dir: /Users/redacted/projects
shared_pool:
  billing_cch_mode: sign
  signing_enabled: true
  signing_evidence_gates_approved: true
  upstream_mode: production
  message_beta_profile: claude_code_2_1_150_subscription_1m
  persona_resolver:
    source_of_truth: cc_gateway_dynamic_persona_resolver
    registry_profile: claude_code_2_1_150_subscription_1m
    exact_version: 2.1.150
    version_family: 2.1
    trusted_minor_drift:
      example_version: 2.1.151
      decision: observed_minor_drift
      capability_downgrade_allowed: false
    unknown_major:
      decision: quarantine_version
      action: fail_closed
    future_candidate_models:
      allowlist_ref: candidate_model_allowlist
      decision: gray_path
      capability_downgrade_allowed: false
  candidate_model_allowlist:
    - claude-sonnet-4-8
    - claude-opus-4-8
  candidate_model_replay_proofs:
    claude-sonnet-4-8: fixture-sonnet-48
    claude-opus-4-8: fixture-opus-48
  candidate_model_kill_switches:
    claude-sonnet-4-8: false
    claude-opus-4-8: false
  candidate_model_audit_budgets:
    claude-sonnet-4-8: 25
    claude-opus-4-8: 25
  production_upstream_enabled: true
  production_budget:
    mode: observe_only
    enforcement_enabled: false
    p0_hard_block_only: true
account_identities:
  opaque:account-ref:v1:placeholder:
    device_id: "<from-account-identity>"
    account_uuid_ref: "opaque:account-ref:v1:placeholder"
    account_ref: "opaque:account-ref:v1:placeholder"
    account_ref_policy: server_scoped_hmac_with_key_id_scope_version_required
    persona_variant: claude-code-2.1.150-macos-local
    session_policy: preserve_downstream_session_id
    policy_version: 2.1.150
egress_buckets:
  home-ip-canary-2026-05-22:
    enabled: true
    proxy_url: "${CC_EGRESS_PROXY_URL}"
    allowed_account_ids:
      - "opaque:account-ref:v1:placeholder"
logging:
  level: info
  audit: true
