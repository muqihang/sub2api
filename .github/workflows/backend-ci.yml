name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CC_GATEWAY_REPO_ROOT: ${{ github.workspace }}/.ci/cc-gateway
    steps:
      - uses: actions/checkout@v6
      - name: Checkout pinned CC Gateway integration fixture
        uses: actions/checkout@v6
        with:
          repository: muqihang/cc-gateway
          ref: 2800d398d9ad98d296dca238d6bc06179b70340a
          path: .ci/cc-gateway
      - name: Install CC Gateway integration fixture
        working-directory: .ci/cc-gateway
        run: npm ci
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.5'
      - name: Unit tests
        working-directory: backend
        run: make test-unit
      - name: Integration tests
        working-directory: backend
        run: make test-integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend typecheck and critical vitest
        run: make test-frontend

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.5'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          # Preserve the imported lint debt while rejecting every new issue.
          args: --timeout=30m --new-from-rev=a0c51e3c674c858fb11b09f21d94d72ec909f554
          working-directory: backend
