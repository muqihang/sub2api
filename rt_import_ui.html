<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RT 导入工具</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.15);
      --border: rgba(148, 163, 184, 0.18);
      --danger: #ef4444;
      --warn: #f59e0b;
      --info: #38bdf8;
      --shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.14), transparent 24%),
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 22%),
        linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .hero {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }
    .target {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.55);
      color: #cbd5e1;
      width: fit-content;
      box-shadow: var(--shadow);
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
      gap: 20px;
    }
    .panel {
      background: rgba(17, 24, 39, 0.82);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .panel-inner {
      padding: 20px;
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }
    .subtle {
      color: var(--muted);
      font-size: 14px;
    }
    textarea {
      width: 100%;
      min-height: 340px;
      resize: vertical;
      border-radius: 16px;
      padding: 16px;
      background: rgba(2, 6, 23, 0.72);
      color: var(--text);
      border: 1px solid var(--border);
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }
    .mode-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 16px;
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid var(--border);
      margin: 10px 0 14px;
      width: fit-content;
    }
    button {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      transition: transform 0.12s ease, opacity 0.12s ease, background-color 0.12s ease;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: progress; }
    .mode-switch button {
      padding: 10px 14px;
      border-radius: 12px;
      background: transparent;
      color: #cbd5e1;
      border: 1px solid transparent;
    }
    .mode-switch button.active {
      background: var(--accent-soft);
      border-color: rgba(34, 197, 94, 0.35);
      color: #bbf7d0;
    }
    .primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .secondary { background: rgba(148, 163, 184, 0.14); color: var(--text); border: 1px solid var(--border); }
    .ghost { background: transparent; color: #cbd5e1; border: 1px dashed var(--border); }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.42);
      color: #cbd5e1;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat {
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.55);
      padding: 16px;
    }
    .stat strong {
      display: block;
      font-size: 24px;
      margin-top: 6px;
    }
    .status {
      min-height: 44px;
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.4);
      color: #cbd5e1;
      margin-bottom: 14px;
    }
    .status.info { border-color: rgba(56, 189, 248, 0.35); color: #bae6fd; }
    .status.success { border-color: rgba(34, 197, 94, 0.35); color: #bbf7d0; }
    .status.error { border-color: rgba(239, 68, 68, 0.35); color: #fecaca; }
    .log {
      margin: 0;
      padding: 14px;
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.72);
      border: 1px solid var(--border);
      color: #cbd5e1;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      max-height: 220px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      vertical-align: top;
    }
    th { color: #cbd5e1; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.ok { background: rgba(34, 197, 94, 0.14); color: #86efac; }
    .badge.fail { background: rgba(239, 68, 68, 0.14); color: #fca5a5; }
    .small { font-size: 12px; color: var(--muted); }
    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="target">目标导入实例：<strong>http://127.0.0.1:18081</strong></div>
      <h1>OpenAI Token 导入工具</h1>
      <p>支持两种模式：<code>RT 导入</code> 和 <code>AT 导入</code>。点击开始后会调用本地助手服务，并把成功项导入到当前 <code>sub2api</code> 的 <code>18081</code> 实例。</p>
    </section>

    <section class="grid">
      <div class="panel">
        <div class="panel-inner">
          <h2 class="section-title">输入 Token</h2>
          <div class="mode-switch" role="tablist" aria-label="导入模式">
            <button id="modeRtBtn" type="button" class="active">RT 导入</button>
            <button id="modeAtBtn" type="button">AT 导入</button>
          </div>
          <p id="modeHint" class="subtle">每行一个 RT，重复项会自动去重。默认会执行“验证 → 导入/更新”。</p>
          <textarea id="tokens" placeholder="rt_xxx&#10;rt_yyy&#10;rt_zzz"></textarea>
          <div class="actions">
            <button id="pasteBtn" class="secondary" type="button">从剪贴板粘贴</button>
            <label class="toggle">
              <input id="validateOnly" type="checkbox" />
              <span>仅验证，不导入</span>
            </label>
            <button id="runBtn" class="primary" type="button">开始执行</button>
            <button id="clearBtn" class="ghost" type="button">清空</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-inner">
          <h2 class="section-title">执行结果</h2>
          <div id="status" class="status info">等待开始。</div>
          <div class="stats">
            <div class="stat">
              <div class="small">总数</div>
              <strong id="totalCount">0</strong>
            </div>
            <div class="stat">
              <div class="small">成功</div>
              <strong id="successCount">0</strong>
            </div>
            <div class="stat">
              <div class="small">失败</div>
              <strong id="failedCount">0</strong>
            </div>
          </div>
          <div class="actions">
            <button id="copyReportBtn" class="secondary" type="button" disabled>复制 JSON 报告</button>
          </div>
          <pre id="log" class="log">尚未执行。</pre>
        </div>
      </div>
    </section>

    <section class="panel" style="margin-top: 20px;">
      <div class="panel-inner">
        <h2 class="section-title">明细</h2>
        <div class="subtle">成功项会显示创建/更新动作、账号 ID 和账号名；失败项会展示错误摘要。</div>
        <div style="overflow:auto;">
          <table>
            <thead>
              <tr>
                <th>状态</th>
                <th>Token</th>
                <th>动作</th>
                <th>账号</th>
                <th>说明</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr><td colspan="5" class="small">暂无结果。</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const runBtn = document.getElementById('runBtn')
    const pasteBtn = document.getElementById('pasteBtn')
    const clearBtn = document.getElementById('clearBtn')
    const copyReportBtn = document.getElementById('copyReportBtn')
    const modeRtBtn = document.getElementById('modeRtBtn')
    const modeAtBtn = document.getElementById('modeAtBtn')
    const modeHintEl = document.getElementById('modeHint')
    const tokensEl = document.getElementById('tokens')
    const validateOnlyEl = document.getElementById('validateOnly')
    const statusEl = document.getElementById('status')
    const logEl = document.getElementById('log')
    const resultsBody = document.getElementById('resultsBody')
    const totalCountEl = document.getElementById('totalCount')
    const successCountEl = document.getElementById('successCount')
    const failedCountEl = document.getElementById('failedCount')

    let latestReport = null
    let currentMode = 'rt'

    const modeConfig = {
      rt: {
        hint: '每行一个 RT，重复项会自动去重。默认会执行“验证 → 导入/更新”。',
        placeholder: 'rt_xxx\\nrt_yyy\\nrt_zzz'
      },
      at: {
        hint: '每行一个 AT；如果同时带 RT，请使用 `AT----RT`。AT-only 导入后无法自动续期。',
        placeholder: 'eyJhb...\\neyJhb_access----rt_xxx\\neyJhb_access_2'
      }
    }

    const setRunning = (running) => {
      runBtn.disabled = running
      pasteBtn.disabled = running
      clearBtn.disabled = running
      validateOnlyEl.disabled = running
      runBtn.textContent = running ? '执行中…' : '开始执行'
    }

    const applyMode = (mode) => {
      currentMode = mode
      modeRtBtn.classList.toggle('active', mode === 'rt')
      modeAtBtn.classList.toggle('active', mode === 'at')
      modeHintEl.textContent = modeConfig[mode].hint
      tokensEl.placeholder = modeConfig[mode].placeholder
      setStatus(mode === 'rt' ? '当前模式：RT 导入。' : '当前模式：AT 导入。', 'info')
    }

    const setStatus = (message, type = 'info') => {
      statusEl.textContent = message
      statusEl.className = `status ${type}`
    }

    const renderResults = (results = []) => {
      if (!results.length) {
        resultsBody.innerHTML = '<tr><td colspan="5" class="small">暂无结果。</td></tr>'
        return
      }
      resultsBody.innerHTML = results.map((item) => {
        const rawToken = item.refresh_token || item.token || ''
        const tokenPreview = rawToken.length > 18
          ? `${rawToken.slice(0, 8)}...${rawToken.slice(-6)}`
          : rawToken
        const badgeClass = item.success ? 'ok' : 'fail'
        const badgeText = item.success ? '成功' : '失败'
        const accountText = item.account_id
          ? `#${item.account_id}${item.account_name ? ` · ${item.account_name}` : ''}`
          : (item.account_name || '-')
        const detail = item.success ? (item.message || '-') : (item.error || '-')
        return `
          <tr>
            <td><span class="badge ${badgeClass}">${badgeText}</span></td>
            <td><code>${tokenPreview}</code></td>
            <td>${item.action || '-'}</td>
            <td>${accountText}</td>
            <td>${detail}</td>
          </tr>
        `
      }).join('')
    }

    const renderReport = (response) => {
      latestReport = response.report || null
      const summary = latestReport?.summary || { total: 0, success: 0, failed: 0 }
      totalCountEl.textContent = String(summary.total || 0)
      successCountEl.textContent = String(summary.success || 0)
      failedCountEl.textContent = String(summary.failed || 0)
      logEl.textContent = [response.stdout, response.stderr].filter(Boolean).join('\n').trim() || '无额外输出。'
      renderResults(latestReport?.results || [])
      copyReportBtn.disabled = !latestReport
      if (response.ok) {
        setStatus(summary.failed ? '执行完成：部分成功，部分失败。' : '执行完成：全部成功。', summary.failed ? 'info' : 'success')
      } else {
        setStatus('执行失败，请查看下方日志。', 'error')
      }
    }

    runBtn.addEventListener('click', async () => {
      const tokens = tokensEl.value.trim()
      if (!tokens) {
        setStatus('请先粘贴至少一条 token。', 'error')
        return
      }
      setRunning(true)
      setStatus('正在执行，请稍候…', 'info')
      logEl.textContent = '正在调用本地导入服务…'
      renderResults([])
      totalCountEl.textContent = successCountEl.textContent = failedCountEl.textContent = '0'
      try {
        const response = await fetch('/api/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tokens,
            mode: currentMode,
            validate_only: validateOnlyEl.checked
          })
        })
        const data = await response.json()
        renderReport(data)
      } catch (error) {
        latestReport = null
        copyReportBtn.disabled = true
        setStatus(`请求失败：${error}`, 'error')
        logEl.textContent = String(error)
      } finally {
        setRunning(false)
      }
    })

    pasteBtn.addEventListener('click', async () => {
      try {
        tokensEl.value = await navigator.clipboard.readText()
        setStatus('已从剪贴板读取内容。', 'info')
      } catch (error) {
        setStatus(`读取剪贴板失败：${error}`, 'error')
      }
    })

    clearBtn.addEventListener('click', () => {
      tokensEl.value = ''
      latestReport = null
      copyReportBtn.disabled = true
      totalCountEl.textContent = successCountEl.textContent = failedCountEl.textContent = '0'
      renderResults([])
      logEl.textContent = '尚未执行。'
      setStatus('输入已清空。', 'info')
    })

    modeRtBtn.addEventListener('click', () => applyMode('rt'))
    modeAtBtn.addEventListener('click', () => applyMode('at'))

    copyReportBtn.addEventListener('click', async () => {
      if (!latestReport) return
      try {
        await navigator.clipboard.writeText(JSON.stringify(latestReport, null, 2))
        setStatus('JSON 报告已复制到剪贴板。', 'success')
      } catch (error) {
        setStatus(`复制失败：${error}`, 'error')
      }
    })

    applyMode('rt')
  </script>
</body>
</html>
